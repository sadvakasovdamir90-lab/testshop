<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Корзина | QulanShop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        .product-card { transition: all 0.3s ease; }
        .product-card:active { transform: scale(0.98); }
        .promo-shadow { box-shadow: 0 10px 25px -5px rgba(249, 115, 22, 0.1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide { animation: slideUp 0.4s ease forwards; }
    </style>
</head>
<body class="font-sans text-slate-900 pb-32">

    <header class="sticky top-0 z-[100] bg-white/80 backdrop-blur-md px-4 py-5 flex justify-between items-center border-b border-slate-100">
        <button onclick="location.href='index.html'" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-900 active:scale-90 transition border border-slate-200">
            <i class="fas fa-arrow-left text-sm"></i>
        </button>
        <h1 class="text-base font-black italic uppercase tracking-[0.1em]">Моя Корзина</h1>
        <div class="w-10"></div>
    </header>

    <main class="p-4 max-w-xl mx-auto space-y-6">
        <div class="py-4">
            <h2 class="text-3xl font-black italic uppercase tracking-tighter">Ваш <span class="text-orange-600">Заказ</span></h2>
            <p class="text-slate-400 text-[10px] font-bold uppercase mt-1 italic tracking-widest">Бесплатная доставка по Кулану</p>
        </div>

        <div id="cart-container" class="space-y-4">
            </div>

        <div class="pt-4">
            <div class="bg-white p-2 rounded-[1.5rem] border-2 border-slate-50 flex items-center promo-shadow">
                <div class="w-10 h-10 bg-orange-50 rounded-xl flex items-center justify-center text-orange-600 shrink-0 ml-1">
                    <i class="fas fa-percentage text-sm"></i>
                </div>
                <input type="text" id="promo-input" placeholder="ЕСТЬ ПРОМОКОД?" class="flex-1 bg-transparent px-4 outline-none text-xs font-black italic uppercase placeholder:text-slate-300">
                <button onclick="applyPromo()" class="bg-slate-900 text-white px-5 py-3 rounded-xl text-[10px] font-black uppercase italic tracking-widest active:scale-95 transition">ОК</button>
            </div>
            <p id="promo-msg" class="text-[9px] font-bold uppercase italic mt-2 ml-4 hidden"></p>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm space-y-4">
            <div class="flex justify-between items-center text-[10px] font-bold uppercase italic text-slate-400 tracking-widest px-2">
                <span id="items-count">Товары (0)</span>
                <span id="subtotal-amount">0 ₸</span>
            </div>
            <div id="promo-row" class="hidden flex justify-between items-center text-[10px] font-bold uppercase italic text-orange-600 tracking-widest px-2">
                <span>Скидка по промокоду</span>
                <span id="promo-discount-val">-0 ₸</span>
            </div>
            <div class="flex justify-between items-center text-[10px] font-bold uppercase italic text-green-600 tracking-widest px-2">
                <span>Доставка</span>
                <span>Бесплатно</span>
            </div>
            <div class="h-[1px] bg-slate-100 w-full"></div>
            <div class="flex justify-between items-end px-1">
                <div class="flex flex-col">
                    <span class="text-[10px] font-black uppercase italic text-slate-400">Итого:</span>
                    <span id="total-amount" class="text-3xl font-black italic tracking-tighter">0 ₸</span>
                </div>
                <i class="fas fa-shopping-cart text-slate-100 text-4xl"></i>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-lg border-t border-slate-100">
        <div class="max-w-xl mx-auto">
            <button onclick="handleCheckout()" class="w-full bg-orange-600 text-white py-4 rounded-[1.5rem] font-black uppercase italic tracking-widest text-sm shadow-xl shadow-orange-100 active:scale-95 transition flex items-center justify-center gap-3">
                Оформить заказ <i class="fas fa-chevron-right text-[10px]"></i>
            </button>
        </div>
    </div>

<script>
// 1. LocalStorage-тен тауарларды алу
let cart = JSON.parse(localStorage.getItem('qulanCart')) || [];
let discountPercent = 0; // Промокод пайызын сақтау

function renderCart() {
    const container = document.getElementById('cart-container');
    const totalElement = document.getElementById('total-amount');
    const subtotalElement = document.getElementById('subtotal-amount');
    const countElement = document.getElementById('items-count');
    
    if (cart.length === 0) {
        container.innerHTML = `
            <div class="text-center py-20 animate-slide">
                <i class="fas fa-shopping-basket text-5xl text-slate-300 mb-4"></i>
                <p class="italic text-gray-400 text-sm">Ваша корзина пока пуста...</p>
                <button onclick="location.href='index.html'" class="mt-4 text-orange-600 font-bold text-xs uppercase underline">Перейти к покупкам</button>
            </div>`;
        totalElement.innerText = "0 ₸";
        subtotalElement.innerText = "0 ₸";
        countElement.innerText = "Товары (0)";
        return;
    }

    container.innerHTML = '';
    let totalOriginal = 0;
    let totalItems = 0;

    cart.forEach((item, index) => {
        let price = Number(item.price);
        totalOriginal += price * item.quantity;
        totalItems += item.quantity;

        // Тауардың жеке бағасын промокодпен есептеу
        let discountedPrice = price;
        let priceHTML = `<span class="text-lg font-black italic text-slate-900">${price.toLocaleString()} ₸</span>`;

        if (discountPercent > 0) {
            discountedPrice = Math.floor(price - (price * (discountPercent / 100)));
            priceHTML = `
                <div class="flex flex-col">
                    <span class="text-[10px] text-slate-400 line-through">${price.toLocaleString()} ₸</span>
                    <span class="text-lg font-black italic text-orange-600">${discountedPrice.toLocaleString()} ₸</span>
                </div>
            `;
        }

        container.innerHTML += `
            <div class="product-card bg-white p-4 rounded-[2rem] flex items-center gap-4 shadow-sm border border-slate-50 animate-slide" style="animation-delay: ${index * 0.1}s">
                <div class="w-20 h-20 bg-slate-50 rounded-2xl flex items-center justify-center shrink-0 border border-slate-100 overflow-hidden">
                    <img src="${item.icon || item.img || 'images/no-photo.jpg'}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150'">
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex justify-between items-start">
                        <h3 class="font-bold italic text-sm uppercase truncate pr-2">${item.name}</h3>
                        <button onclick="removeItem(${index})" class="text-slate-300 hover:text-red-500 transition">
                            <i class="fas fa-times text-xs"></i>
                        </button>
                    </div>
                    <p class="text-slate-400 text-[10px] font-bold italic mb-3 uppercase">Premium Quality</p>
                    <div class="flex items-center justify-between">
                        ${priceHTML}
                        <div class="flex items-center gap-3 bg-slate-50 px-2 py-1 rounded-xl border border-slate-200">
                            <button onclick="updateQuantity(${index}, -1)" class="w-6 h-6 flex items-center justify-center text-slate-400 active:scale-90 transition"><i class="fas fa-minus text-[8px]"></i></button>
                            <span class="text-xs font-black w-4 text-center">${item.quantity}</span>
                            <button onclick="updateQuantity(${index}, 1)" class="w-6 h-6 flex items-center justify-center text-orange-600 active:scale-90 transition"><i class="fas fa-plus text-[8px]"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        `;
    });

    // Төменгі жалпы есептеулер
    subtotalElement.innerText = totalOriginal.toLocaleString() + " ₸";
    
    let finalTotal = totalOriginal;
    if (discountPercent > 0) {
        let discountAmount = Math.floor(totalOriginal * (discountPercent / 100));
        finalTotal = totalOriginal - discountAmount;
        document.getElementById('promo-row').classList.remove('hidden');
        document.getElementById('promo-discount-val').innerText = `-${discountAmount.toLocaleString()} ₸`;
    }

    totalElement.innerText = finalTotal.toLocaleString() + " ₸";
    countElement.innerText = `Товары (${totalItems})`;
}

// Промокод қолдану
window.applyPromo = function() {
    const input = document.getElementById('promo-input').value.toUpperCase().trim();
    const msg = document.getElementById('promo-msg');
    const promos = JSON.parse(localStorage.getItem('promos')) || [];
    
    const found = promos.find(p => p.code === input);
    
    msg.classList.remove('hidden');
    if (found) {
        discountPercent = parseInt(found.percent);
        msg.innerText = `ПРОМОКОД ПРИНЯТ: -${discountPercent}% ✅`;
        msg.className = "text-[9px] font-bold uppercase italic mt-2 ml-4 text-green-600";
    } else {
        discountPercent = 0;
        msg.innerText = "ПРОМОКОД НЕ НАЙДЕН ❌";
        msg.className = "text-[9px] font-bold uppercase italic mt-2 ml-4 text-red-500";
        document.getElementById('promo-row').classList.add('hidden');
    }
    renderCart(); // Тізімді қайта сызу (бағалар өзгеруі үшін)
}

window.handleCheckout = function() {
    if (cart.length === 0) {
        alert("Сначала добавьте товары в корзину! 🛒");
        return;
    }
    
    // Соңғы бағаны сақтап кету (checkout-қа керек болса)
    const finalPriceText = document.getElementById('total-amount').innerText;
    localStorage.setItem('finalTotal', finalPriceText);
    
    // ЖАҢА: Тек сандық мәнді де сақтаймыз (checkout бетінде есептеулерге ыңғайлы болу үшін)
    localStorage.setItem('finalCartTotal', finalPriceText.replace(/\D/g, ''));

    location.href = 'checkout.html';
}

window.updateQuantity = function(index, delta) {
    if (cart[index].quantity + delta > 0) {
        cart[index].quantity += delta;
        saveAndRefresh();
    } else {
        removeItem(index);
    }
}

window.removeItem = function(index) {
    cart.splice(index, 1);
    saveAndRefresh();
}

function saveAndRefresh() {
    localStorage.setItem('qulanCart', JSON.stringify(cart));
    renderCart();
}

document.addEventListener('DOMContentLoaded', renderCart);
</script>

</body>
</html>
