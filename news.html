<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QulanMedia — Official Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        body { 
            background-color: #f0f4f8; 
            color: #1e293b; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Кәсіби Көк Градиент */
        .premium-blue {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        /* Карточка стилі */
        .news-card {
            background: white;
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 2.5rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.1);
            border-color: #3b82f6;
        }

        /* Пункттар (Категориялар) */
        .badge {
            font-size: 9px;
            font-weight: 800;
            padding: 6px 12px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-blue { background: #eff6ff; color: #1d4ed8; }
        .badge-orange { background: #fff7ed; color: #ea580c; }
        .badge-red { background: #fef2f2; color: #dc2626; animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-200">
        <div class="max-w-5xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 premium-blue rounded-2xl flex items-center justify-center shadow-xl shadow-blue-900/20">
                    <i class="fas fa-newspaper text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tighter text-slate-900">
                        Qulan<span class="text-blue-600">Media</span>
                    </h1>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest italic">Official QulanShop Network</p>
                </div>
            </div>

            <a href="index.html" class="hidden md:flex items-center gap-3 px-6 py-3 bg-slate-900 text-white rounded-2xl hover:bg-blue-600 transition-all duration-300 shadow-lg shadow-slate-900/20 active:scale-95">
                <i class="fas fa-store text-xs"></i>
                <span class="text-xs font-bold uppercase italic">Вернуться в магазин</span>
            </a>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-12">
        
        <div class="mb-12">
            <div class="flex items-center gap-3 mb-6 px-2">
                <div class="w-2 h-2 bg-blue-600 rounded-full"></div>
                <h2 class="text-[11px] font-black uppercase tracking-[0.3em] text-slate-400">Навигация по разделам</h2>
            </div>
            <div id="category-filters" class="flex gap-3 overflow-x-auto no-scrollbar pb-4">
                </div>
        </div>

        <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            </div>
    </main>

    <footer class="max-w-5xl mx-auto px-6 py-16 text-center border-t border-slate-200 mt-20">
        <div class="inline-flex items-center gap-2 mb-4">
            <div class="w-1.5 h-1.5 bg-blue-600 rounded-full"></div>
            <span class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-400 italic">QulanShop Media Group</span>
        </div>
        <p class="text-[10px] text-slate-400 font-medium italic uppercase">Құланөтпес ауылы, 2026. Барлық мәліметтер қорғалған.</p>
    </footer>

    <script>
        function loadNews(filter = 'all') {
            const container = document.getElementById('news-container');
            const filtersContainer = document.getElementById('category-filters');
            const news = JSON.parse(localStorage.getItem('village_news')) || [];

            // 1. Фильтрлерді шығару (Кәсіби батырмалар)
            const categories = ['all', ...new Set(news.map(n => n.category))];
            filtersContainer.innerHTML = categories.map(cat => `
                <button onclick="loadNews('${cat}')" 
                    class="px-8 py-4 rounded-[1.5rem] text-[10px] font-black uppercase italic transition-all whitespace-nowrap
                    ${filter === cat ? 'premium-blue text-white shadow-2xl shadow-blue-900/30' : 'bg-white text-slate-500 border border-slate-200 hover:border-blue-300'}">
                    ${cat === 'all' ? 'Все новости' : cat}
                </button>
            `).join('');

            // 2. Мәліметтерді сүзу
            const filteredNews = filter === 'all' ? news : news.filter(n => n.category === filter);

            if (filteredNews.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-32 text-center bg-white rounded-[3rem] border-2 border-dashed border-slate-100">
                        <i class="fas fa-inbox text-5xl text-slate-100 mb-6"></i>
                        <p class="text-slate-400 font-black uppercase text-[10px] tracking-widest italic">В данном разделе пока нет публикаций</p>
                    </div>`;
                return;
            }

            // 3. Карточкаларды шығару
            container.innerHTML = filteredNews.map(item => {
                let badgeClass = "badge-blue";
                if(item.category === "⚠️ МАҢЫЗДЫ") badgeClass = "badge-red";
                if(item.category === "🛍️ ЖАҢА ТАУАР") badgeClass = "badge-orange";

                return `
                <div class="news-card p-8 flex flex-col justify-between group">
                    <div>
                        <div class="flex items-center justify-between mb-8">
                            <span class="badge ${badgeClass}">
                                ${item.category || 'Общее'}
                            </span>
                            <div class="flex items-center gap-2 text-slate-300">
                                <i class="far fa-clock text-[10px]"></i>
                                <span class="text-[10px] font-bold uppercase italic">${item.date || 'Today'}</span>
                            </div>
                        </div>
                        
                        <p class="text-slate-800 text-xl font-bold leading-relaxed mb-10 italic">
                            "${item.text}"
                        </p>
                    </div>
                    
                    <div class="flex items-center justify-between pt-6 border-t border-slate-50">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center border border-slate-100 group-hover:bg-blue-50 transition-colors">
                                <i class="fas fa-shield-alt text-blue-600"></i>
                            </div>
                            <div>
                                <p class="text-[11px] font-black text-slate-900 uppercase italic leading-none mb-1">Редакция QulanShop</p>
                                <p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">Verified Information</p>
                            </div>
                        </div>
                        
                        <div class="flex gap-2">
                            <button class="w-10 h-10 bg-slate-50 hover:bg-blue-600 hover:text-white rounded-xl flex items-center justify-center text-slate-400 transition-all active:scale-90">
                                <i class="fas fa-share-alt text-sm"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
            }).reverse().join('');
        }

        window.onload = () => loadNews();
    </script>
</body>
</html>
