<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <title>Избранное | QulanShop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-card { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

<header class="bg-white shadow-sm py-4 mb-6 sticky top-0 z-50">
    <div class="container mx-auto px-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <button onclick="history.back()" class="text-gray-500 hover:text-orange-600 transition">
                <i class="fas fa-arrow-left text-xl"></i>
            </button>
            <h1 class="text-xl font-bold text-orange-600 cursor-pointer" onclick="location.href='index.html'">QulanShop</h1>
        </div>
        <div class="flex items-center gap-4 text-gray-700">
            <span class="text-sm font-bold italic">Избранное</span>
            <i class="fas fa-heart text-red-500"></i>
        </div>
    </div>
</header>

<main class="container mx-auto px-4 pb-20">
    <div id="wishlist-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
        </div>

    <div id="wishlist-empty" class="hidden flex flex-col items-center justify-center py-20 text-center">
        <div class="bg-white p-8 rounded-full shadow-inner mb-6">
            <i class="fas fa-heart-broken text-7xl text-gray-200"></i>
        </div>
        <h2 class="text-2xl font-black text-gray-800 uppercase italic">Тут пока пусто</h2>
        <p class="text-gray-400 mt-2 mb-8 italic">Вы еще не добавили ни одного товара в избранное.</p>
        <button onclick="location.href='index.html'" class="bg-orange-600 text-white px-10 py-4 rounded-2xl font-bold shadow-lg shadow-orange-200 hover:bg-orange-700 transition active:scale-95 uppercase tracking-widest">
            В магазин
        </button>
    </div>
</main>

<script>
    function renderWishlist() {
        const container = document.getElementById('wishlist-container');
        const emptyMsg = document.getElementById('wishlist-empty');
        
        let wishlist = JSON.parse(localStorage.getItem('qulanWishlist')) || [];

        if (wishlist.length === 0) {
            container.innerHTML = '';
            emptyMsg.classList.remove('hidden');
            return;
        }

        emptyMsg.classList.add('hidden');
        container.innerHTML = wishlist.map((item, index) => `
            <div class="bg-white rounded-[2rem] border border-gray-100 p-3 shadow-sm hover:shadow-xl transition-all group relative animate-card">
                <button onclick="removeFromWishlist(${index})" class="absolute top-4 right-4 z-10 bg-white/90 text-gray-300 hover:text-red-500 w-8 h-8 rounded-full shadow-sm flex items-center justify-center transition active:scale-90">
                    <i class="fas fa-trash-alt text-xs"></i>
                </button>

                <div class="aspect-square rounded-[1.5rem] overflow-hidden bg-gray-50 mb-3 border border-gray-50">
                    <img src="${item.image || 'images/no-photo.jpg'}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" onerror="this.src='https://via.placeholder.com/150'">
                </div>

                <div class="px-2">
                    <h3 class="text-[13px] font-bold text-gray-800 truncate mb-1">${item.name}</h3>
                    <p class="text-orange-600 font-black text-lg italic mb-3">${parseInt(item.price).toLocaleString()} ₸</p>
                    
                    <button onclick="moveToCart(${index})" class="w-full bg-gray-900 text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-orange-600 transition active:scale-95 flex items-center justify-center gap-2">
                        <i class="fas fa-shopping-basket"></i> В корзину
                    </button>
                </div>
            </div>
        `).join('');
    }

    function removeFromWishlist(index) {
        let wishlist = JSON.parse(localStorage.getItem('qulanWishlist')) || [];
        wishlist.splice(index, 1);
        localStorage.setItem('qulanWishlist', JSON.stringify(wishlist));
        renderWishlist();
    }

    function moveToCart(index) {
        let wishlist = JSON.parse(localStorage.getItem('qulanWishlist')) || [];
        let cart = JSON.parse(localStorage.getItem('qulanCart')) || [];
        
        cart.push({ ...wishlist[index], quantity: 1 });
        localStorage.setItem('qulanCart', JSON.stringify(cart));
        
        wishlist.splice(index, 1);
        localStorage.setItem('qulanWishlist', JSON.stringify(wishlist));
        
        renderWishlist();
        
        Swal.fire({
            toast: true,
            position: 'top-end',
            icon: 'success',
            title: 'Добавлено в корзину',
            showConfirmButton: false,
            timer: 2000,
            timerProgressBar: true
        });
    }

    window.addEventListener('DOMContentLoaded', renderWishlist);
</script>

</body>
</html>
