    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Скроллбарды жасыру (Chrome, Safari, Edge) */

    .skeleton {
    background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%);
    background-size: 200% 100%;
    animation: loading 1.5s infinite;
}
@keyframes loading {

<!-- Скрипт бөлімі -->
<script>
   function renderWishlist() {
    const container = document.getElementById('wishlist-container');
    const emptyMsg = document.getElementById('wishlist-empty');
    
    // LocalStorage-тен тауарларды алу
    let wishlist = JSON.parse(localStorage.getItem('qulanWishlist')) || [];

    // Егер тізім бос болса
    if (wishlist.length === 0) {
        container.innerHTML = '';
        emptyMsg.classList.remove('hidden');
        updateHeaderBadge(); // Санды нөлге түсіру
        return;
    }

    // Тізім бос болмаса, хабарламаны жасыру
    emptyMsg.classList.add('hidden');

    // МІНЕ, ОСЫ ЖЕРГЕ ҚОЙЫЛАДЫ:
    container.innerHTML = wishlist.map((item, index) => `
        <div class="bg-white rounded-[1.5rem] sm:rounded-[2.5rem] border border-gray-100 p-3 sm:p-5 shadow-[0_10px_25px_-10px_rgba(0,0,0,0.05)] hover:shadow-xl transition-all duration-300 group relative animate-card">
            
            <!-- Жою батырмасы (Оң жақ жоғарыда) -->
            <button onclick="removeFromWishlist(${index})" class="absolute top-4 right-4 z-10 w-8 h-8 bg-white/80 backdrop-blur-sm text-gray-300 hover:text-red-500 rounded-full shadow-sm flex items-center justify-center transition active:scale-90">
                <i class="fas fa-trash-alt text-xs"></i>
            </button>

            <!-- Сурет (Басқанда тауар бетіне өту) -->
            <div class="aspect-square rounded-2xl sm:rounded-3xl overflow-hidden bg-gray-50 mb-4 border border-gray-50 cursor-pointer" onclick="location.href='product.html?id=${item.id}'">
                <img src="${item.img || 'images/no-photo.jpg'}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" onerror="this.src='https://via.placeholder.com/150'">
            </div>

            <!-- Ақпарат -->
            <div class="px-1">
                <h3 class="text-[12px] sm:text-[13px] font-bold text-gray-800 truncate mb-1 italic tracking-tight">${item.name}</h3>
                <p class="text-orange-600 font-black text-base sm:text-lg italic mb-4 leading-none">${parseInt(item.price).toLocaleString()} ₸</p>
                
                <button onclick="moveToCart(${index})" class="w-full bg-gray-950 text-white py-3 sm:py-3.5 rounded-xl sm:rounded-2xl text-[9px] sm:text-[10px] font-black uppercase tracking-widest hover:bg-orange-600 transition-all active:scale-95 flex items-center justify-center gap-2">
                    <i class="fas fa-shopping-basket text-xs"></i>
                    В корзину
                </button>
            </div>
        </div>
    `).join('');

    // Әр жолы санды жаңартып отыру
    updateHeaderBadge();
}
    

    function removeFromWishlist(index) {
        let wishlist = JSON.parse(localStorage.getItem('qulanWishlist')) || [];
        wishlist.splice(index, 1);
        localStorage.setItem('qulanWishlist', JSON.stringify(wishlist));
        renderWishlist();
    }

    function moveToCart(index) {
        let wishlist = JSON.parse(localStorage.getItem('qulanWishlist')) || [];
        let cart = JSON.parse(localStorage.getItem('qulanCart')) || [];
        
        const itemToMove = wishlist[index];
        
        // Себетте бар-жоғын тексеру
        let existingItem = cart.find(c => String(c.id) === String(itemToMove.id));

        if (existingItem) {
            existingItem.quantity += 1;
        } else {
            cart.push({ ...itemToMove, quantity: 1 });
        }
        
        localStorage.setItem('qulanCart', JSON.stringify(cart));
        
        // Жүрекшеден алып тастау
        wishlist.splice(index, 1);
        localStorage.setItem('qulanWishlist', JSON.stringify(wishlist));
        
        renderWishlist();
        
        // SweetAlert уведомление
        const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 2000,
            timerProgressBar: true
        });

        Toast.fire({
            icon: 'success',
            title: 'Перенесено в корзину! 🛒'
        });
    }

    window.addEventListener('DOMContentLoaded', renderWishlist);
    window.addEventListener('load', () => {
    const loader = document.getElementById('global-loader');
    if (loader) {
        loader.classList.add('opacity-0'); // Әдемі жоғалу эффекті
        setTimeout(() => {
            loader.style.display = 'none';
        }, 500); // 0.5 секундтан кейін толық өшеді
    }
});

// 1. ТАУАРЛАРДЫ ШЫҒАРУ
function renderRecommendations() {
    const products = JSON.parse(localStorage.getItem('products')) || [];
    const container = document.getElementById('recommendations-container');
    
    if (!container || products.length === 0) return;

    // Кездейсоқ 8 тауарды таңдау (скролл болуы үшін көп тауар керек)
    const shuffled = products.sort(() => 0.5 - Math.random()).slice(0, 8);
    
    container.innerHTML = shuffled.map((p, index) => `
        <div class="snap-start flex-none w-[240px] sm:w-[280px] md:w-[300px] bg-white rounded-[2.5rem] border border-gray-50 p-4 sm:p-5 shadow-[0_10px_30px_-10px_rgba(0,0,0,0.03)] hover:shadow-[0_20px_40px_-15px_rgba(249,115,22,0.1)] transition-all duration-500 group relative cursor-pointer overflow-hidden" onclick="location.href='product.html?id=${p.id}'">
    
            <div class="aspect-[4/3] rounded-3xl overflow-hidden bg-gray-100 mb-5 relative border border-gray-50">
                <img src="${p.img || 'images/no-photo.jpg'}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700 eased-out" onerror="this.src='https://via.placeholder.com/300x200'">
                <span class="absolute top-3 left-3 bg-black/50 backdrop-blur-sm text-white text-[9px] font-black uppercase italic px-3 py-1.5 rounded-full tracking-wider opacity-60">Art: ${p.id.toString().substring(0, 5)}</span>
            </div>

            <div class="px-1 space-y-2">
                <h3 class="text-sm font-bold text-gray-900 truncate italic group-hover:text-orange-600 transition">${p.name}</h3>
                <div class="flex items-end justify-between gap-2 pt-1">
                    <p class="text-2xl font-black text-orange-600 italic tracking-tighter leading-none">${parseInt(p.price).toLocaleString()} ₸</p>
                    <span class="text-[10px] font-bold text-gray-400 uppercase italic pb-1">Цена за ед.</span>
                </div>
            </div>

            <div class="absolute -bottom-10 -right-10 w-24 h-24 bg-orange-600 rounded-full flex items-center justify-center text-white text-xl opacity-0 group-hover:opacity-100 group-hover:-bottom-5 group-hover:-right-5 transition-all duration-500 shadow-xl shadow-orange-200">
                <i class="fas fa-arrow-right"></i>
            </div>
        </div>
    `).join('');
}

// 2. БАТЫРМАЛАР АРҚЫЛ АЙНАЛДЫРУ (SCROLL)
function scrollRecs(direction) {
    const container = document.getElementById('recommendations-container');
    const scrollAmount = 320; // Бір карточканың ені + gap
    
    if (direction === 'left') {
        container.scrollLeft -= scrollAmount;
    } else {
        container.scrollLeft += scrollAmount;
    }
}

//DOMContentLoaded ішіне қосып қой
window.addEventListener('DOMContentLoaded', () => {
    // ... ескі функциялар ...
    renderRecommendations();
});

function checkCartDot() {
    const cart = JSON.parse(localStorage.getItem('qulanCart')) || [];
    const dot = document.getElementById('cart-dot');
    if (cart.length > 0) dot.classList.remove('hidden');
}

//DOMContentLoaded ішіне қосып қой
// Барлық функцияларды бір жерден шақыру
window.addEventListener('DOMContentLoaded', () => {
    renderWishlist();         // Wishlist тауарларын шығару
    renderRecommendations();  // Ұсыныстарды шығару
    checkCartDot();           // Себеттегі нүктені тексеру
    updateOnlineStatus();     // Интернетті тексеру
});

// 1. САНДЫ ЖАҢАРТУ (БАДЖ)
function updateWishlistBadge() {
    const wishlist = JSON.parse(localStorage.getItem('qulanWishlist')) || [];
    const badge = document.getElementById('wishlist-count');
    if (badge) {
        badge.innerText = wishlist.length;
        // Егер тауар жоқ болса, баджды жасыруға болады
        badge.style.display = wishlist.length > 0 ? 'flex' : 'none';
    }
}

// 2. WHATSAPP-ҚА БӨЛІСУ
function shareWishlist() {
    const wishlist = JSON.parse(localStorage.getItem('qulanWishlist')) || [];
    if (wishlist.length === 0) {
        Swal.fire({ icon: 'info', title: 'Список пуст', text: 'Добавьте товары, чтобы поделиться ими!' });
        return;
    }

    let message = "Привет! Посмотри, что я выбрал в QulanShop: \n\n";
    wishlist.forEach((item, i) => {
        message += `${i+1}. ${item.name} - ${item.price} ₸ \n`;
    });
    message += "\nЗаказать тут: " + window.location.origin;

    const encodedMsg = encodeURIComponent(message);
    window.open(`https://wa.me/?text=${encodedMsg}`, '_blank');
}

// 3. СКЕЛЕТОНДЫ БАСҚАРУ (RENDER-ДІ ЖАҢАРТУ)
const originalRender = renderWishlist;
renderWishlist = function() {
    const container = document.getElementById('wishlist-container');
    // Жүктелу анимациясын көрсету (тек бірінші рет ашылғанда)
    if (container.innerHTML === "") {
        container.innerHTML = `<div class="skeleton h-64 rounded-[2rem]"></div>`.repeat(5);
        setTimeout(() => {
            originalRender();
            updateWishlistBadge();
        }, 800); // 0.8 секундтан кейін нағыз тауарлар шығады
    } else {
        originalRender();
        updateWishlistBadge();
    }
};

</script>
